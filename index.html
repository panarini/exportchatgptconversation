<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Export ChatGPT</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #ff7a18 0%, #ff5f57 100%);
      color: white;
      position: relative;
    }

    .topbar {
      position: absolute;
      top: 42px;
      right: 48px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .share {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 14px;
      backdrop-filter: blur(10px);
    }

    .export {
      background: white;
      color: black;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      box-shadow:
        0 0 0 8px rgba(255,255,255,0.12),
        0 10px 30px rgba(0,0,0,0.15);
    }

    .center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
    }

    h1 {
      font-size: 76px;
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: -3px;
      margin-bottom: 24px;
    }

    p {
      font-size: 24px;
      line-height: 1.5;
      opacity: 0.9;
      max-width: 620px;
    }

    .arrow {
      position: absolute;
      width: 280px;
      height: 280px;
      top: 290px;
      right: 280px;
      opacity: 0.9;
    }

    @media (max-width: 900px) {
      h1 {
        font-size: 52px;
      }

      p {
        font-size: 18px;
        padding: 0 24px;
      }

      .topbar {
        top: 28px;
        right: 24px;
      }

      .arrow {
        width: 180px;
        height: 180px;
        top: 340px;
        right: 120px;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="share">Share</div>
    <div class="export">Export ▼</div>
  </div>

  <svg class="arrow" viewBox="0 0 300 300" fill="none">
    <path
      d="M30 250C120 250 160 190 220 120"
      stroke="white"
      stroke-width="10"
      stroke-linecap="round"
    />
    <path
      d="M195 120L225 118L223 148"
      stroke="white"
      stroke-width="10"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </svg>

  <div class="center">
    <h1>Congratulations!</h1>

    <p>
      Your Export button is now active inside ChatGPT.
    </p>
  </div>

</body>
</html>
