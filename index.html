<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Export ChatGPT</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      color: #0d0d0d;
    }

    /* ── SIDEBAR ─────────────────────────────────────────────────────────── */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: #f9f9f9;
      border-right: 1px solid #ebebeb;
      display: flex;
      flex-direction: column;
      padding: 8px;
    }

    .sidebar-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 14px;
      color: #555;
      background: none;
      border: none;
      cursor: default;
      text-align: left;
      width: 100%;
      margin-bottom: 2px;
    }
    .sidebar-btn:first-child { color: #111; }

    .chat-list {
      flex: 1;
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
    }

    .chat-placeholder {
      height: 34px;
      border-radius: 8px;
      background: #e4e4e4;
      filter: blur(3px);
    }

    .sidebar-footer {
      padding: 8px 4px 4px;
      border-top: 1px solid #ebebeb;
      margin-top: 8px;
    }

    .user-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-radius: 8px;
    }

    .user-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #555;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 12px; font-weight: 600;
      flex-shrink: 0;
    }

    .user-name {
      font-size: 14px;
      font-weight: 500;
      color: #111;
      filter: blur(4px);
      user-select: none;
    }

    /* ── MAIN ────────────────────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* ── TOPBAR ──────────────────────────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid #ebebeb;
      height: 57px;
      flex-shrink: 0;
      gap: 8px;
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 15px;
      font-weight: 600;
      color: #111;
    }

    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Export button + ripple rings */
    .export-wrap { position: relative; }

    .ring {
      position: absolute;
      inset: -24px;
      border-radius: 24px;
      border: 2px solid rgba(229, 90, 47, 0.28);
      animation: ringAnim 3.2s ease-out infinite;
      pointer-events: none;
      opacity: 0;
    }
    .ring:nth-child(2) { animation-delay: 1.07s; }
    .ring:nth-child(3) { animation-delay: 2.13s; }

    @keyframes ringAnim {
      0%   { transform: scale(0.82); opacity: 0; }
      12%  { opacity: 1; }
      100% { transform: scale(1.75); opacity: 0; }
    }

    .export-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 32px;
      background: #fff !important;
      border: 1px solid #ddd;
      border-radius: 16px;
      font-size: 22px;
      font-weight: 500;
      color: #111 !important;
      cursor: pointer;
      position: relative;
      z-index: 2;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: background 0.15s, box-shadow 0.15s;
    }
    .export-btn:hover {
      background: #fff8f5 !important;
      box-shadow: 0 2px 8px rgba(229, 90, 47, 0.14);
    }
    .export-btn span {
      color: #111 !important;
    }

    .fake-topbar-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      color: #888;
      opacity: 0.45;
      pointer-events: none;
    }

    .more-btn {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      color: #888;
      opacity: 0.4;
    }

    /* ── CHAT AREA ───────────────────────────────────────────────────────── */
    .chat-area {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .messages {
      flex: 1;
      overflow: hidden;
      padding: 40px 0 16px;
    }

    .messages-inner {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 28px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* Blurred user bubble */
    .user-bubble {
      align-self: flex-end;
      background: #f0f0f0;
      border-radius: 18px;
      width: 52%;
      height: 46px;
      filter: blur(5px);
    }

    /* AI message row */
    .ai-row {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .ai-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #000;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      margin-top: 2px;
    }

    .ai-text {
      font-size: 15px;
      line-height: 1.72;
      color: #111;
    }
    .ai-text strong { font-weight: 600; }

    /* Highlighted "Export" word inside the message */
    .hl {
      color: #e55a2f;
      font-weight: 600;
      background: rgba(229, 90, 47, 0.09);
      padding: 1px 5px;
      border-radius: 4px;
      white-space: nowrap;
    }

    /* Blurred lines below */
    .blurred-block {
      display: flex;
      flex-direction: column;
      gap: 9px;
      filter: blur(5px);
      opacity: 0.3;
    }
    .blur-line {
      height: 15px;
      border-radius: 8px;
      background: #c8c8c8;
    }

    /* ── BOTTOM INPUT ────────────────────────────────────────────────────── */
    .bottom-wrap {
      padding: 12px 28px 18px;
      border-top: 1px solid #ebebeb;
      flex-shrink: 0;
    }

    .input-mock {
      max-width: 680px;
      margin: 0 auto;
      background: #f4f4f4;
      border-radius: 16px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #aaa;
      font-size: 15px;
    }

    /* ── CONGRATS TITLE ─────────────────────────────────────────────────── */
    .congrats-title {
      font-size: 54px;
      font-weight: 800;
      letter-spacing: -2.5px;
      line-height: 1.08;
      background: linear-gradient(135deg, #ff9a3d 0%, #ff4d1f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      padding-bottom: 4px;
    }

    /* ── ARROW OVERLAY ───────────────────────────────────────────────────── */
    #arrow-overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #arrow-overlay.visible { opacity: 1; }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <button class="sidebar-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    <span id="txt-new-chat">New chat</span>
  </button>
  <button class="sidebar-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <span id="txt-search">Search chats</span>
  </button>
  <div class="chat-list">
    <div class="chat-placeholder" style="width:88%"></div>
    <div class="chat-placeholder" style="width:72%"></div>
    <div class="chat-placeholder" style="width:94%"></div>
    <div class="chat-placeholder" style="width:65%"></div>
    <div class="chat-placeholder" style="width:80%"></div>
    <div class="chat-placeholder" style="width:77%"></div>
    <div class="chat-placeholder" style="width:58%"></div>
    <div class="chat-placeholder" style="width:85%"></div>
    <div class="chat-placeholder" style="width:70%"></div>
    <div class="chat-placeholder" style="width:61%"></div>
    <div class="chat-placeholder" style="width:90%"></div>
    <div class="chat-placeholder" style="width:68%"></div>
  </div>
  <div class="sidebar-footer">
    <div class="user-row">
      <div class="user-avatar"></div>
      <div class="user-name">Richard Richardson</div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-brand">
      <span>ChatGPT</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 9l6 6 6-6"/>
      </svg>
    </div>

    <div class="topbar-right">
      <!-- REAL EXPORT BUTTON with rings -->
      <div class="export-wrap">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <button class="export-btn" id="export-btn">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <path d="M12 3V14" stroke="#e55a2f" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M7.5 10.5L12 15L16.5 10.5" stroke="#e55a2f" stroke-width="2.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M5 16V17.5C5 19.4 6.1 20.5 8 20.5H16C17.9 20.5 19 19.4 19 17.5V16"
                  stroke="#e55a2f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span id="txt-export">Export</span>
        </button>
      </div>

      <!-- Fake Share button -->
      <div class="fake-topbar-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/>
          <circle cx="18" cy="19" r="3"/>
          <path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/>
        </svg>
        <span id="txt-share">Share</span>
      </div>

      <!-- Fake "…" -->
      <div class="more-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="5" r="1.5"/>
          <circle cx="12" cy="12" r="1.5"/>
          <circle cx="12" cy="19" r="1.5"/>
        </svg>
      </div>
    </div>
  </header>

  <!-- CHAT -->
  <div class="chat-area">
    <div class="messages">
      <div class="messages-inner">

        <!-- Blurred user question -->
        <div class="user-bubble"></div>

        <!-- Big congratulations heading -->
        <div class="congrats-title" id="congrats-title"></div>

        <!-- AI congratulations message -->
        <div class="ai-row">
          <div class="ai-text" id="ai-text">
            <!-- filled by welcome.js -->
          </div>
        </div>

        <!-- Blurred content below -->
        <div class="blurred-block">
          <div class="blur-line" style="width:91%"></div>
          <div class="blur-line" style="width:78%"></div>
          <div class="blur-line" style="width:86%"></div>
          <div class="blur-line" style="width:63%"></div>
        </div>

      </div>
    </div>

    <!-- Bottom input -->
    <div class="bottom-wrap">
      <div class="input-mock">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        <span id="txt-placeholder">Ask ChatGPT</span>
      </div>
    </div>
  </div>
</div>

<!-- ARROW OVERLAY — drawn by JS over the whole viewport -->
<svg id="arrow-overlay" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowHead" markerWidth="10" markerHeight="8"
            refX="9" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 Z" fill="#e55a2f"/>
    </marker>
  </defs>
  <path id="arrow-path" fill="none"
        stroke="#e55a2f" stroke-width="2.2" opacity="0.75"
        stroke-dasharray="7,5" stroke-linecap="round"
        marker-end="url(#arrowHead)"/>
</svg>

<canvas id="confetti-canvas" style="position:fixed;top:0;left:0;width:50vw;height:100vh;pointer-events:none;z-index:50;"></canvas>
<script>
'use strict';

// ── i18n ──────────────────────────────────────────────────────────────────────
var isRu = false // (navigator.language || '').toLowerCase().startsWith('ru');

var strings = {
    newChat:        isRu ? 'Новый чат'          : 'New chat',
    search:         isRu ? 'Искать чаты'        : 'Search chats',
    exportBtn:      isRu ? 'Экспорт'            : 'Export',
    share:          isRu ? 'Поделиться'         : 'Share',
    placeholder:    isRu ? 'Спросите ChatGPT'   : 'Ask ChatGPT',
    congratsTitle:  isRu ? 'Поздравляем!'       : 'Congratulations!',
    aiMsg: isRu
        ? 'Теперь вы можете экспортировать любой чат в PDF — ' +
          'прямо из ChatGPT, в один клик.<br><br>' +
          'Нажмите кнопку в правом верхнем углу: ' +
          '<span class="hl" id="arrow-anchor">Экспорт</span>'
        : 'You can now export any conversation to PDF — ' +
          'right from ChatGPT, in one click.<br><br>' +
          'Click the button in the top-right corner: ' +
          '<span class="hl" id="arrow-anchor">Export</span>',
};

// ── Fill text content ─────────────────────────────────────────────────────────
[
    ['txt-new-chat',    strings.newChat],
    ['txt-search',      strings.search],
    ['txt-export',      strings.exportBtn],
    ['txt-share',       strings.share],
    ['txt-placeholder', strings.placeholder],
    ['congrats-title',  strings.congratsTitle],
].forEach(function(pair) {
    var el = document.getElementById(pair[0]);
    if (el) el.textContent = pair[1];
});

document.getElementById('ai-text').innerHTML = strings.aiMsg;

// ── Navigation ────────────────────────────────────────────────────────────────
var EXTENSION_ID = 'aighdeikamhkemngfanhnamdlpoceimo';

function goToChatGPT() {
    // Try to communicate with the extension for smart tab navigation
    if (typeof chrome !== 'undefined' && chrome.runtime && chrome.runtime.sendMessage) {
        try {
            chrome.runtime.sendMessage(EXTENSION_ID, {action: 'openChatGPT'}, function(response) {
                if (chrome.runtime.lastError || !response) {
                    // Extension not installed or can't communicate — fallback
                    window.open('https://chatgpt.com', '_blank');
                }
                // If successful, extension handles the navigation
            });
            return;
        } catch(e) {}
    }
    // Fallback for non-Chrome or extension not installed
    window.open('https://chatgpt.com', '_blank');
}

document.getElementById('export-btn').addEventListener('click', goToChatGPT);

// ── Confetti ──────────────────────────────────────────────────────────────────
(function() {
    var canvas = document.getElementById('confetti-canvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    canvas.width  = window.innerWidth * 0.5;
    canvas.height = window.innerHeight;

    var colors = ['#ff6030','#ff9a3d','#ffcc80','#ff4d1f','#ffb347','#fff0e0','#e85d04'];
    var pieces = [];
    var COUNT = 120;
    for (var i = 0; i < COUNT; i++) {
        pieces.push({
            x:       Math.random() * canvas.width * 0.7,
            y:      -20 - Math.random() * 300,
            w:       8  + Math.random() * 8,
            h:       4  + Math.random() * 5,
            color:   colors[Math.floor(Math.random() * colors.length)],
            angle:   Math.random() * Math.PI * 2,
            spin:   (Math.random() - 0.5) * 0.18,
            vx:     (Math.random() - 0.3) * 3,
            vy:      2.5 + Math.random() * 3.5,
            opacity: 1,
            delay:   Math.random() * 60
        });
    }

    var frame = 0;
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        var alive = 0;
        pieces.forEach(function(p) {
            if (frame < p.delay) return;
            p.x  += p.vx;
            p.y  += p.vy;
            p.vy += 0.07;
            p.angle += p.spin;
            if (p.y > canvas.height * 0.85) p.opacity -= 0.035;
            if (p.opacity <= 0) return;
            alive++;
            ctx.save();
            ctx.globalAlpha = Math.max(0, p.opacity);
            ctx.translate(p.x, p.y);
            ctx.rotate(p.angle);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
        });
        frame++;
        if (alive > 0 || frame < 80) {
            requestAnimationFrame(draw);
        } else {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    }
    draw();
})();

// ── Arrow ─────────────────────────────────────────────────────────────────────
// Starts from BELOW the "Export" word in the message so the line
// doesn't pass through the text itself.
function drawArrow() {
    var anchor  = document.getElementById('arrow-anchor');
    var btn     = document.getElementById('export-btn');
    var overlay = document.getElementById('arrow-overlay');
    var path    = document.getElementById('arrow-path');
    if (!anchor || !btn || !overlay || !path) return;

    var a = anchor.getBoundingClientRect();
    var b = btn.getBoundingClientRect();

    // Start: below the center of the highlighted word
    var sx = a.left + a.width / 2;
    var sy = a.bottom + 10;

    // End: just below the Export button center (arrowhead points upward into button)
    var ex = b.left + b.width / 2;
    var ey = b.bottom + 5;

    // Cubic bezier: first ctrl goes right at start height,
    // second comes from well below end so tangent arrives pointing straight up
    var c1x = sx + (ex - sx) * 0.5;
    var c1y = sy + 20;
    var c2x = ex;
    var c2y = ey + 80;

    path.setAttribute('d',
        'M ' + sx + ' ' + sy +
        ' C ' + c1x + ' ' + c1y +
        ' '   + c2x + ' ' + c2y +
        ' '   + ex  + ' ' + ey
    );
    overlay.classList.add('visible');
}

window.addEventListener('load', function() {
    setTimeout(drawArrow, 650);
    window.addEventListener('resize', function() {
        setTimeout(drawArrow, 80);
    });
});

</script>
</body>
</html>
