<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>You've removed Export ChatGPT</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f9f9f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: #fff;
      border: 1px solid #ebebeb;
      border-radius: 16px;
      padding: 32px 32px 24px;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .brand {
      font-size: 13px;
      font-weight: 500;
      color: #bbb;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    iframe {
      display: block;
      width: 100%;
      height: 480px;
      border: none;
      margin-bottom: 20px;
    }
    .reinstall { font-size: 13px; color: #999; }
    .reinstall a { color: #EA4C3A; text-decoration: none; font-weight: 600; }
    .reinstall a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <p class="brand">Export ChatGPT</p>
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLScnqBoShBCay5iR6TXtQpthBeu-Ussstey5Nfnxp0_gzZ82CQ/viewform?embedded=true"
      loading="lazy"
    >Loading…</iframe>
    <p class="reinstall">
      Changed your mind?
      <a href="https://chromewebstore.google.com/detail/aighdeikamhkemngfanhnamdlpoceimo" target="_blank">Reinstall the extension</a>
    </p>
  </div>
</body>
</html>
